name: MLOps CI-CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-lint-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint source code
        run: ruff check src api tests

      - name: Run unit tests
        run: pytest -q

      - name: Validate data acquisition, EDA, and training scripts
        run: |
          python -m src.data_acquisition
          python -m src.eda
          python -m src.train

      - name: Docker build validation
        run: docker build -t heart-disease-mlops-ci:latest .